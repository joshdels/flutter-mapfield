name: mapfield
description: "TopmapField Flutter Mobile GIS."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_map: ^8.2.2
  flutter_riverpod: ^3.2.1
  http: ^1.6.0
  latlong2: ^0.9.1
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/basemap/

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/logo.png"
